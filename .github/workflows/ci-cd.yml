name: Quant-Investor CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  engine-core:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Set up uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Install dependencies
      run: |
        uv sync --extra dev

    - name: Lint with flake8
      run: |
        uv run flake8 quant_investor --count --select=E9,F63,F7,F82 --show-source --statistics
        uv run flake8 quant_investor --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics

    - name: Type check with mypy
      run: |
        uv run mypy quant_investor --ignore-missing-imports --no-strict-optional

    - name: Test engine core
      run: |
        uv run pytest \
          tests/unit/test_market_cli_pipeline.py \
          tests/unit/test_mainline_dag_cutover.py \
          tests/unit/test_llm_model_routing.py \
          tests/unit/test_llm_transport_policy.py \
          tests/unit/test_llm_usage_tracking.py \
          tests/unit/test_review_layer_budgeting.py \
          tests/unit/test_single_mainline.py \
          --override-ini addopts='' -q

  workspace-surface:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Set up uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: "npm"
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: |
        uv sync --extra dev
        npm ci --prefix frontend

    - name: Test workspace surface
      run: |
        uv run pytest \
          tests/unit/test_workspace_api_contract.py \
          tests/unit/test_workspace_web_entrypoint.py \
          tests/unit/test_workspace_frontend_routes.py \
          --override-ini addopts='' -q

    - name: Lint frontend
      run: npm --prefix frontend run lint

    - name: Build frontend
      run: npm --prefix frontend run build

  legacy-web:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Set up uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Install dependencies
      run: |
        uv sync --extra dev

    - name: Test legacy web surface
      run: |
        uv run pytest tests/unit/test_web_app.py --override-ini addopts='' -q

  build:
    needs: [engine-core, workspace-surface]
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Set up uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Install build dependencies
      run: |
        uv sync --extra dev
        uv run python -m pip install build twine

    - name: Build package
      run: uv run python -m build

    - name: Check package
      run: uv run twine check dist/*

  model-training:
    needs: [engine-core, workspace-surface]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Set up uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Install dependencies
      run: |
        uv sync --extra dev

    - name: Run model training
      env:
        TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      run: |
        echo "运行模型训练..."
        # python scripts/unified/train_models.py --schedule

    - name: Upload model artifacts
      uses: actions/upload-artifact@v4
      with:
        name: trained-models
        path: models/

  deploy-docs:
    needs: [engine-core, workspace-surface]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs
